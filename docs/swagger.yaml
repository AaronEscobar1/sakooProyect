host: localhost:8080
info:
  contact:
    email: soporte@sakoo.com
    name: Soporte Sakoo
    url: http://www.sakoo.com
  description: Servidor API para el Proyecto Sakoo (Arquitectura Limpia).
  license:
    name: Propietaria
    url: http://www.sakoo.com
  termsOfService: http://swagger.io/terms/
  title: Sakoo Backend API
  version: "1.0"
paths:
  /api/admin/notifications/send:
    post:
      consumes:
      - application/json
      description: Envía una notificación push asíncrona a un usuario en particular
        o a todos los usuarios del sistema (broadcast) con un título, cuerpo y payload
        de datos.
      parameters:
      - description: Datos de la notificación
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_domain.SendAdminNotificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Notificación procesada y enviada
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
      security:
      - ApiKeyAuth: []
      summary: Enviar notificación administrativa (BackOffice)
      tags:
      - Notificaciones
  /api/admin/scrape-binance:
    post:
      description: Ejecuta de forma síncrona el worker de Binance P2P para un activo
        específico (USDT o USDC) y actualiza la base de datos.
      parameters:
      - description: Activo a raspar (USDT o USDC, por defecto USDT)
        in: query
        name: asset
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Raspado y actualización de Binance P2P completados con éxito
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
        "400":
          description: Activo inválido
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
        "500":
          description: Error interno al realizar el scraping
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
      security:
      - ApiKeyAuth: []
      summary: Forzar raspado de Binance P2P (USDT/USDC)
      tags:
      - Administración
  /api/admin/scrape-mercantil:
    post:
      description: Ejecuta de forma síncrona el web scraper de Mercantil para actualizar
        las tasas de cambio de este banco.
      produces:
      - application/json
      responses:
        "200":
          description: Raspado y actualización de Mercantil ejecutados con éxito
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
        "500":
          description: Error interno al realizar el scraping
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
      security:
      - ApiKeyAuth: []
      summary: Forzar raspado de tasas Mercantil
      tags:
      - Administración
  /api/admin/scrape-now:
    post:
      description: Ejecuta de forma síncrona el web scraper del Banco Central de Venezuela
        (BCV) para actualizar las tasas de cambio.
      produces:
      - application/json
      responses:
        "200":
          description: Raspado y actualización del BCV ejecutados con éxito
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
        "500":
          description: Error interno al realizar el scraping
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
      security:
      - ApiKeyAuth: []
      summary: Forzar raspado de tasas BCV
      tags:
      - Administración
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Autentica a un usuario mediante su correo electrónico y contraseña
        (cifrada con RSA en tránsito) y devuelve un token JWT.
      parameters:
      - description: Credenciales de acceso
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Sesión iniciada correctamente
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-github_com_aaron_sakoo-backend_internal_domain_AuthResponse'
        "401":
          description: Credenciales incorrectas
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
      summary: Iniciar sesión de usuario
      tags:
      - Autenticación
  /api/auth/public-key:
    get:
      description: Retorna la clave pública RSA en formato PEM para cifrar credenciales
        de usuario antes de transmitirlas.
      produces:
      - application/json
      responses:
        "200":
          description: Clave pública obtenida correctamente
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-internal_api_PublicKeyResponse'
      summary: Obtener clave pública RSA
      tags:
      - Autenticación
  /api/rates:
    post:
      description: Retorna las últimas tasas de cambio obtenidas para todas las monedas
        registradas.
      produces:
      - application/json
      responses:
        "200":
          description: Tasas obtenidas exitosamente
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-array_internal_api_RateResponse'
        "500":
          description: Error interno al obtener tasas
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
      summary: Obtener tasas de cambio más recientes
      tags:
      - Tasas de Cambio
  /api/rates/history:
    post:
      consumes:
      - application/json
      description: Retorna una lista paginada del historial de tasas de cambio según
        moneda y rangos de fechas opcionales.
      parameters:
      - description: Parámetros de paginación y filtros
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.HistoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Historial obtenido exitosamente
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-internal_api_PaginatedRatesResponse'
        "400":
          description: Datos de entrada inválidos
          schema:
            $ref: '#/definitions/github_com_aaron_sakoo-backend_internal_api_response.APIResponse-any'
      summary: Obtener historial de tasas de cambio
      tags:
      - Tasas de Cambio
  /api/v1/account:
    delete:
      consumes:
      - application/json
      description: Elimina de forma lógica la cuenta del usuario autenticado validando
        un código OTP.
      parameters:
      - description: Confirmación de eliminación con código OTP
        in: body
